<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>精灵预览</title>
<style>
  body { background: #333; padding: 20px; font-family: sans-serif; }
  .grid { display: flex; flex-wrap: wrap; gap: 20px; }
  .item { text-align: center; }
  .item img { display: block; width: 96px; height: 96px; image-rendering: pixelated; }
  .item span { color: white; font-size: 13px; }
  h3 { color: #aaa; margin: 20px 0 8px; }
</style>
</head>
<body>
<h3>🔥 火系</h3>
<div class="grid">
  <div class="item"><img src="../assets/sprites/炎喵_front.png"><span>炎喵</span></div>
  <div class="item"><img src="../assets/sprites/烈火猫_front.png"><span>烈火猫</span></div>
  <div class="item"><img src="../assets/sprites/焚焰狮_front.png"><span>焚焰狮</span></div>
</div>
<h3>💧 水系</h3>
<div class="grid">
  <div class="item"><img src="../assets/sprites/蓝蛇_front.png"><span>蓝蛇</span></div>
  <div class="item"><img src="../assets/sprites/江蛟_front.png"><span>江蛟</span></div>
  <div class="item"><img src="../assets/sprites/覆海龙_front.png"><span>覆海龙</span></div>
</div>
<h3>🌿 草系</h3>
<div class="grid">
  <div class="item"><img src="../assets/sprites/小竹熊_front.png"><span>小竹熊</span></div>
  <div class="item"><img src="../assets/sprites/武道熊_front.png"><span>武道熊</span></div>
  <div class="item"><img src="../assets/sprites/功夫熊师_front.png"><span>功夫熊师</span></div>
</div>
</body>
</html>
